name: edueire2
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Core packages
  http: ^1.2.1
  xml: ^6.5.0
  collection: ^1.18.0
  intl: ^0.20.2

  # Env & utilities
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.2.3
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # UI icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/fonts/
    - assets/chatbot/

  fonts:
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
        - asset: assets/fonts/OpenDyslexic-Bold.otf
          weight: 700
        - asset: assets/fonts/OpenDyslexic-Italic.otf
          style: italic
